<!DOCTYPE html>
<html lang="zh-Hant" data-build-lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>脫蠟鑄造廠 勞工安全衛生手冊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --steel:#1B1D1F;
  --steel-2:#2A2D30;
  --paper:#F2EFE8;
  --paper-2:#E7E2D6;
  --ink:#20201C;
  --ink-soft:#54524A;
  --yellow:#FFC72C;
  --yellow-deep:#E0A000;
  --red:#C8102E;
  --red-deep:#8F0B20;
  --green:#2E7D46;
  --line:#D8D2C2;
  --radius:14px;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth; -webkit-text-size-adjust:100%;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"Noto Sans TC",sans-serif;
  font-weight:400;
  font-size:16px;
  line-height:1.7;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
h1,h2,h3,.display{
  font-family:"Noto Sans TC",sans-serif;
  font-weight:900;
  letter-spacing:.01em;
}
a{color:inherit; -webkit-tap-highlight-color:transparent;}
button{-webkit-tap-highlight-color:transparent;}
.mono{font-family:"JetBrains Mono",monospace;}
.ln, p, .stitle, .content, .textblock{overflow-wrap:anywhere; word-break:break-word;}
.ln{display:block;}

/* ---------- hazard stripe ---------- */
.hazard-stripe{
  height:10px;
  background:repeating-linear-gradient(135deg,var(--yellow) 0 18px,var(--steel) 18px 36px);
}

/* ---------- top bar ---------- */
.topbar{
  position:sticky; top:0; z-index:50;
  background:var(--steel);
  color:#fff;
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 18px;
  gap:12px;
  flex-wrap:wrap;
}
.topbar .brand{
  font-weight:900; font-size:15px; letter-spacing:.02em;
  display:flex; flex-direction:column; line-height:1.3;
}
.langlink{
  color:#C9CCCF; text-decoration:none; font-weight:700; font-size:12px;
  background:var(--steel-2); padding:8px 12px; border-radius:999px; white-space:nowrap;
}

/* ---------- hero ---------- */
.hero{
  background:var(--steel);
  color:#fff;
  padding:34px 18px 26px;
  text-align:center;
}
.hero .eyebrow{
  color:var(--yellow); font-weight:700; font-size:13px;
  letter-spacing:.12em; margin-bottom:10px;
}
.hero h1{font-size:clamp(24px,6vw,40px); margin:0 0 6px; color:#fff;}
.hero p.sub{color:#C9CCCF; font-size:14px; max-width:640px; margin:14px auto 0;}

/* process strip */
.process-strip-wrap{
  margin-top:26px;
  overflow-x:auto;
  padding:6px 8px 16px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x proximity;
  display:flex;
  justify-content:center;
}
.process-strip{
  display:flex; align-items:stretch; gap:0; min-width:max-content;
  padding:0 6px;
}
.proc-chip{
  display:flex; flex-direction:column; align-items:center;
  text-decoration:none; color:#fff;
  width:98px; flex:0 0 auto; position:relative; padding:10px 4px 6px;
  scroll-snap-align:start;
}
.proc-chip .num{
  font-family:"JetBrains Mono",monospace; font-weight:700; font-size:11px;
  color:var(--steel); background:var(--yellow);
  width:24px; height:24px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:8px; z-index:2;
}
.proc-chip.risk-red .num{background:var(--red); color:#fff;}
.proc-chip.risk-green .num{background:var(--green); color:#fff;}
.proc-chip .connector{
  position:absolute; top:22px; left:-48%; width:96%; height:2px;
  background:#44474A; z-index:1;
}
.proc-chip:first-child .connector{display:none;}
.proc-chip .lbl{font-size:11.5px; font-weight:700; line-height:1.35; text-align:center;}
.proc-chip .dot{
  margin-top:6px; width:6px; height:6px; border-radius:50%;
  background:var(--yellow);
}
.proc-chip.risk-red .dot{background:var(--red);}
.proc-chip.risk-green .dot{background:var(--green);}

/* ---------- layout ---------- */
main{max-width:880px; margin:0 auto; padding:26px 16px 100px;}
section{margin-bottom:34px;}
.section-head{
  display:flex; align-items:baseline; gap:10px; margin-bottom:14px;
  border-bottom:3px solid var(--steel); padding-bottom:8px;
}
.section-head .idx{
  font-family:"JetBrains Mono",monospace; font-weight:700; color:var(--yellow-deep);
  background:var(--steel); padding:2px 8px; border-radius:6px; font-size:13px;
}
.section-head h2{font-size:20px; margin:0; color:var(--ink);}
.section-intro{font-size:14px; color:var(--ink-soft); margin:0 0 16px;}

/* card / accordion */
details.card{
  background:#fff; border:1px solid var(--line); border-radius:var(--radius);
  margin-bottom:12px; overflow:hidden;
}
details.card[open]{border-color:var(--steel);}
details.card summary{
  list-style:none; cursor:pointer;
  display:flex; align-items:center; gap:12px; padding:16px;
  font-weight:700; min-height:32px;
}
details.card summary::-webkit-details-marker{display:none;}
details.card summary .icon{
  flex:0 0 auto; width:34px; height:34px; border-radius:9px;
  background:var(--paper-2); display:flex; align-items:center; justify-content:center;
  color:var(--steel);
}
details.card summary .icon svg{width:18px; height:18px; flex:0 0 auto; display:block;}
details.card summary .stitle{flex:1; font-size:15.5px; min-width:0;}
details.card summary .stitle .sub{display:block; font-weight:500; font-size:.72em; color:var(--ink-soft); margin-top:2px;}
details.card summary .chev{transition:transform .2s; color:var(--ink-soft); flex:0 0 auto; padding:6px;}
details.card[open] summary .chev{transform:rotate(180deg);}
details.card .card-body{padding:2px 16px 18px 62px; font-size:15px;}

/* risk left border on station cards */
details.station{border-left:6px solid var(--yellow-deep);}
details.station.risk-red{border-left-color:var(--red);}
details.station.risk-green{border-left-color:var(--green);}
details.station summary .num{
  font-family:"JetBrains Mono",monospace; font-weight:700; font-size:12px;
  color:#fff; background:var(--yellow-deep);
  width:26px; height:26px; border-radius:50%; flex:0 0 auto;
  display:flex; align-items:center; justify-content:center;
}
details.station.risk-red summary .num{background:var(--red);}
details.station.risk-green summary .num{background:var(--green);}
.risk-tag{
  font-size:10.5px; font-weight:700; padding:2px 8px; border-radius:999px;
  background:var(--paper-2); color:var(--ink-soft); flex:0 0 auto;
}
details.station.risk-red .risk-tag{background:#FBE1E4; color:var(--red-deep);}
details.station.risk-green .risk-tag{background:#DCEEE1; color:var(--green);}

.subblock{margin:15px 0;}
.subblock .sh{
  display:flex; align-items:center; gap:7px; font-weight:700; font-size:13px;
  text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:7px;
}
.subblock .sh svg{width:15px; height:15px; flex:0 0 auto;}
.subblock.hazard .sh{color:var(--red-deep);}
.subblock.prevent .sh{color:var(--green);}
.subblock.incident .sh{color:var(--yellow-deep);}
.subblock.ppe .sh{color:#3E5C76;}
.subblock .content .ln{font-size:15px;}
.tankbox{
  background:var(--paper); border:1px dashed var(--line); border-radius:10px;
  padding:12px 14px; margin-bottom:12px; font-size:14.5px;
}
.tankbox strong{display:block; margin-bottom:4px;}

/* general text block */
.textblock .ln{font-size:15px; margin-bottom:3px;}
.textblock .ln:empty{display:none;}

/* emergency FAB */
.fab{
  position:fixed; right:14px; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:60;
  background:var(--red); color:#fff; text-decoration:none;
  width:60px; height:60px; border-radius:50%;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  box-shadow:0 6px 18px rgba(200,16,46,.45);
  font-size:10px; font-weight:700; line-height:1.15; gap:2px;
  border:3px solid #fff; text-align:center;
}
.fab svg{width:20px; height:20px;}

footer{
  text-align:center; padding:26px 16px 40px; color:var(--ink-soft); font-size:12.5px;
}

@media (max-width:640px){
  .topbar{padding:9px 12px;}
  .topbar .brand span:first-child{font-size:13.5px;}

  .hero{padding:24px 14px 20px;}
  .hero .eyebrow{font-size:11.5px;}
  .hero p.sub{font-size:13.5px;}

  main{padding:20px 12px 110px;}
  .section-head h2{font-size:18px;}

  details.card summary{padding:13px 12px; gap:10px;}
  details.card summary .icon,
  details.station summary .num{width:30px; height:30px;}
  details.card .card-body{padding-left:14px; padding-right:12px;}

  details.card summary{flex-wrap:wrap; row-gap:8px;}
  details.card summary .stitle{flex:1 1 auto;}
  details.card summary .chev{order:3; margin-left:auto;}

  details.station summary{
    display:grid;
    grid-template-columns:30px 1fr 22px;
    grid-template-areas:
      "num title chev"
      ".   tag   tag";
    column-gap:10px; row-gap:8px;
    align-items:start;
    flex-wrap:unset;
  }
  details.station summary .num{grid-area:num;}
  details.station summary .stitle{grid-area:title; flex:none;}
  details.station summary .chev{grid-area:chev; order:0; margin-left:0;}
  details.station summary .risk-tag{
    grid-area:tag; justify-self:start; margin-left:0; flex:none;
    font-size:10px; padding:2px 8px;
  }

  .subblock .content .ln,
  .textblock .ln{font-size:14.5px;}

  .fab{width:54px; height:54px; font-size:9px;}
}
</style>
</head>

<script type="application/json" id="manual-data">{"general": {"title": "脫蠟鑄造廠\n勞工安全衛生手冊\n全員共通安全守則．各製程站危害與應對指引\n編製日期：＿＿＿＿年 ＿＿月", "intro": "壹 前言\n脫蠟鑄造製程涵蓋高溫熔煉、酸洗、噴砂研磨、焊接補修等多元作業環境，危害類型同時包含化學性、物理性、人因性等多種風險。本手冊彙整全廠各製程站之主要危害、預防措施及異常發生時的處理步驟，作為現場作業人員與管理人員之安全參考，期望透過清楚的職責分工與標準作業流程，降低職業傷病發生機率，建立安全健康的工作環境。\n本手冊分為兩大部分：第一部分為「全員共通安全守則」，說明不論在哪個站別工作都必須遵守的基本原則；第二部分為「各站危害與應對」，依生產流程逐站說明危害內容、預防措施及異常處理方式。", "ppe_basic": "貳 全員共通安全守則\n一、個人防護具（PPE）基本配備\n依作業區域風險程度不同，個人防護具配備可分為「一般作業區」與「高風險作業區」兩個層級：\n1.一般作業區基本穿著：適合工作的衣服與鞋子、口罩，必要時戴安全帽\n2.高風險作業區加強配備（依各站別需求疊加）：耐酸手套與圍裙（酸洗）、耳塞耳罩（噴砂、研磨）、防塵口罩（製殼、噴砂）、焊接面罩與耐熱手套（焊補、燒結、澆注）、護目鏡（所有有粉塵或飛濺風險之站別）\n•防護具如有破損、變形、過期，請立即停止使用，並向辦公室申請更換補充，不可勉強繼續使用。\n•\t急救藥劑（如敵腐靈、六腐靈、葡萄糖酸鈣）建議每月巡檢一次保存期限，過期主動申請更換。", "equipment_sop": "二、設備異常處理原則（SOP）\n發現機台或設備有異常聲響、震動、漏液、過熱、警示燈亮起等情形時，原則性處理流程如下：\n1.\t發現異常　→ 立即停止操作，不可勉強繼續運轉\n2.\t通報　→ 立即通報現場主管，說明異常狀況\n3.\t等待　→ 在安全距離外等候維修人員處理，不可自行拆卸或排除故障\n•\t嚴禁為求趕工而忽略異常訊號繼續操作機台。\n•\t設備維修中應確實執行上鎖／掛牌（LOTO）機制，避免他人誤觸啟動。", "forklift": "三、堆高機操作安全\n廠內堆高機行駛涉及多個製程站之間的物料搬運，屬橫向共通危害，全員均應留意：\n•\t僅持有合格操作證者方可駕駛堆高機。\n•\t操作堆高機時，必須全程配戴安全帽。\n•\t夜間或光線不足時操作堆高機，應穿著螢光反光背心，以提高自身辨識度。\n•\t行駛時應控制車速，禁止超速、急加速或急轉彎。\n•\t行進中應鳴笛示警，並注意轉角、門口及其他視線死角，確認安全後再通行。\n•\t駕駛人應隨時注意周圍人員及車輛動態；當視線受阻或有人員接近時，應立即減速或停車，確認安全後再繼續行駛。\n•\t行人應隨時注意堆高機動態，避免進入堆高機作業範圍或行駛路徑，並與堆高機保持安全距離。\n•\t駕駛人與行人應互相注意、互相禮讓，共同維護作業安全。\n•\t貨叉載重不得超過額定荷重，貨物堆疊高度不得影響駕駛視線。\n•\t貨叉於非作業或停車時，應降至最低位置，避免影響人員通行及造成碰撞、絆倒等危害。\n•\t嚴禁人員站立或搭乘於貨叉上。", "emergency": "四、緊急狀況通報流程\n無論發生化學灼傷、燙傷、機械夾捲、割傷或火災等任何緊急狀況，原則處理方式如下：\n1.\t先確保自身安全，再進行初步應變（如沖洗、止血、遠離火源）\n2.\t立即通報現場主管／職安人員\n3.\t視傷勢嚴重程度決定是否送醫，化學性灼傷無論當下感覺輕微與否，均建議送醫評估\n4.\t事後填寫異常／事故通報紀錄，作為後續改善依據\n各站別之詳細處理方式，請參考第二部分各站說明。", "section3_intro": "參 各站危害與應對指引\n以下依生產流程順序，逐站說明主要危害、預防措施及異常／受傷發生時之處理方式。各站防護具如有破損、過期，請主動向辦公室申請補充。"}, "stations": [{"name": "射蠟", "hazard": "高溫蠟液燙傷、機台夾手", "prevention": "不徒手碰觸出蠟口\n模具開合時，手不可伸入夾合區", "incident": "燙傷：清水沖洗15 分鐘，不弄破水泡，送醫\n夾傷：通報主管，視傷勢送醫", "ppe": "活性碳口罩、針織手套 (黑)、\n電子棉質手套 (白色)、袖套、圍裙"}, {"name": "修蠟", "hazard": "刀傷、重複性動作造成肌肉骨骼負擔", "prevention": "使用正確工具並避免過度用力\n刀具妥善收納防止誤割\n適時輪調與休息，避免長時間重複動作", "incident": "刀傷：止血、清潔、必要時送醫\n嚴重割傷：立即就醫\n肌肉不適：停止作業、休息伸展，必要時回報主管", "ppe": "活性碳口罩、針織手套 (黑)、\n電子棉質手套 (白色)、袖套、圍裙"}, {"name": "組樹", "hazard": "融蠟氣體（蠟煙）、重複性動作造成肌肉骨骼負擔", "prevention": "作業區域保持通風良好\n定時更換姿勢／輪換工作，不長時間維持同一姿勢", "incident": "頭暈／不適：離開現場至通風處休息，反映主管\n肌肉痠痛持續：反映主管安排調整", "ppe": "活性碳口罩、針織手套 (黑)、\n電子棉質手套 (白色)、袖套、圍裙"}, {"name": "殼模", "hazard": "矽溶膠化學性接觸、撒砂粉塵", "prevention": "戴手套操作沾漿作業，避免徒手接觸漿料\n．撒砂區戴防塵口罩", "incident": "皮膚接觸不適：清水沖洗，持續不適送醫\n粉塵入眼：清水沖洗，送醫", "ppe": "活性碳口罩、棉質手套、PVC 手套 (PVC)、袖套、圍裙"}, {"name": "脫蠟 （高溫蒸氣爆炸風險）", "hazard": "高溫熱源（脫蠟爐／熱設備）、地面積水或水氣接觸高溫設備時，可能造成瞬間汽化（蒸氣爆裂／steam explosion），引發熱水或蠟液噴濺之燙傷風險。", "prevention": "．保持地面乾燥，無積水\n．避免水源靠近高溫設備及脫蠟爐作業區\n．不得站立於高溫設備排氣口、開口或可能噴濺範圍內\n．依標準作業流程（SOP）操作脫蠟爐，禁止擅自調整參數或開啟設備", "incident": "．燙傷：立即以大量清水沖洗至少15 分鐘，不可破壞水泡，並立即送醫\n．發生異常聲響、異味或設備異常狀況：立即撤離至安全距離並通報主管\n．疑似蒸氣噴濺事故：優先確保自身安全，再進行通報與初步應變", "ppe": "活性碳口罩、棉質手套、PVC 手套 (PVC)、袖套、圍裙"}, {"name": "燒結", "hazard": "高溫、紅外線非游離輻射（可能傷眼）、燃燒廢氣", "prevention": "．與爐口保持安全距離\n．戴隔熱面罩\n．作業區域保持通風", "incident": "燙傷：清水沖洗，送醫\n眼睛不適：休息並就醫", "ppe": "活性碳口罩、棉質手套、防護頭盔+ 鏡片、墨鏡、防火手套、防火袖套、防火腳套、防火圍裙、一般圍裙"}, {"name": "澆注 （高溫鋼液噴濺）", "hazard": "高溫鋼液噴濺、灼傷", "prevention": "．全身防護裝備穿戴齊全．\n．澆注區域人員管制，不可單獨作業．", "incident": "灼傷：清水沖洗15 分鐘以上，\n立即送醫\n鋼液噴濺到人：先離開危險區再處理傷口", "ppe": "活性碳口罩、棉質手套、防護頭盔+ 鏡片、墨鏡、防火手套、防火袖套、防火腳套、防火圍裙、一般圍裙"}, {"name": "打殼／噴砂\n（噪音重點站，務必戴耳塞）", "hazard": "噪音（長期暴露導致聽力損失）、粉塵（吸入可能造成肺部疾病、矽肺症）、振動（手部麻痺、白指）、飛濺物擊傷眼睛", "prevention": "．進入噴砂區一定要戴耳塞／耳罩．\n．戴防塵口罩（依粉塵濃度選對應等級）．\n．戴護目鏡，避免飛濺粉塵或顆粒入眼．\n．操作時手勿伸入旋轉／噴射範圍．\n．長時間操作中途適度休息，減少振動累積暴露．", "incident": "粉塵入眼：清水沖洗，不適送醫\n聽力出現耳鳴／聽不清楚：儘速反映主管安排聽力檢查\n手部麻痺／刺痛：暫停作業，反映主管，必要時就醫", "ppe": "耳塞／耳罩、防塵口罩、護目鏡、棉質手套"}, {"name": "切割、研磨", "hazard": "噪音、粉塵、切割傷、火花飛濺", "prevention": "戴耳塞、防塵口罩、護目鏡．\n割時手勿靠近刀刃／砂輪行進方向．", "incident": "割傷：止血加壓，視傷勢送醫\n異物入眼：清水沖洗，送醫", "ppe": "活性碳口罩、棉質手套、耳塞、防護頭盔+ 鏡片、防護眼鏡、平光鏡、袖套、圍裙"}, {"name": "焊補", "hazard": "焊接燻煙（吸入可能傷肺、長期接觸錳燻煙傷神經）\n電弧強光（傷眼，閃光眼）\n燙傷（熔融金屬飛濺、剛焊好的工件）、感電風險", "prevention": "．戴焊接面罩（不可用一般護目鏡代替）．\n．穿耐熱手套、長袖工作服，避免裸露皮膚．\n．焊接區域要通風或有局部排煙．\n．確認電源線、把柄絕緣良好，不在潮濕地面焊接．\n．周邊堆放物與易燃物保持安全距離．", "incident": "燙傷：離開熱源，清水沖洗降溫15 分鐘以上，不要弄破水泡，送醫\n眼睛被強光照到（閃光眼）：休息、避免再接觸強光，眼睛不適儘速就醫\n感電：先關閉電源再施救，不可直接觸碰傷者，送醫", "ppe": "防護口罩、棉質手套、焊接面罩、皮衣、皮手套"}, {"name": "整型", "hazard": "整型機壓傷（手部夾捲）", "prevention": "手不可伸入夾合／沖壓區域．\n機台異常立即停機．\n不可拆除機台防護裝置．", "incident": "夾傷／壓傷：勿強行抽出，先停機，通報主管送醫", "ppe": "活性碳口罩、棉質手套、耳塞、防護頭盔+ 鏡片、防護眼鏡、平光鏡、袖套、圍裙"}, {"name": "酸洗 （高風險重點站：氫氟酸HF／硝酸）", "hazard": "HF（氫氟酸）：剛接觸可能不痛不癢，但會持續往皮膚深層侵蝕，最危險HF (\n硝酸：立即劇痛、皮膚變黃棕色灼傷", "prevention": "．穿好耐酸手套、圍裙、護目鏡／面罩、耐酸鞋．\n．認清楚槽體顏色，工具不可混用．\n．不可單獨作業，現場要有人互相照看．\n．手套使用前先檢查有無破損．", "incident": "Step 1：先確認是哪一桶（白桶HF／黑藍桶硝酸）\n白桶 HF：\n① 立即脫除污染衣物\n② 立即使用 Hexafluorine® 沖洗；若現場無，則以大量清水立即沖洗\n③ 持續沖洗 15–20 分鐘\n④ 使用葡萄糖酸鈣凝膠（依指示）\n⑤ 不論症狀輕重，立即送醫並告知為氫氟酸\n黑／藍桶 硝酸：\n① 馬上脫掉沾到的衣物\n② 清水沖洗15 分鐘\n③ 噴敵腐靈（Diphoterine®）\n④ 濺到眼睛：立刻用沖眼器沖，送醫\n兩種狀況都要：馬上通報現場主管", "ppe": "活性碳口罩、棉質手套、PVC 手套、橡膠手套、耐酸鹼手套袖套、防水圍裙、耐酸鹼雨靴、防護頭盔+ 鏡片、防護眼鏡", "tank": "氫氟酸 HF （白色桶）／硝酸（黑色、藍色桶）－分開獨立槽體，不可混用"}, {"name": "包裝出貨", "hazard": "搬重造成的人因危害（腰部／肌肉骨骼）、銳邊割傷", "prevention": "搬重物採正確姿勢（蹲低、靠近身體）．\n必要時請同事協助或使用搬運工具．\n注意鑄件銳邊．", "incident": "腰部扭傷：休息並反映主管，必要時就醫\n割傷：止血消毒，視傷勢送醫", "ppe": "活性碳口罩、棉質手套、針織手套 (黑色)、PVC 手套、袖套、圍裙"}]}</script>

    prevent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.5 8.5 8 11 4.5-2.5 8-6 8-11V5z"/><path d="m9 12 2 2 4-4"/></svg>',
    incident: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v6"/><path d="M9 5h6"/><rect x="4" y="8" width="16" height="13" rx="2"/><path d="M12 12v5"/><path d="M9.5 14.5h5"/></svg>',
    gear: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3H9a1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9V9a1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.6 1z"/></svg>'
  };

  // ---------------- process strip ----------------
  var strip = document.getElementById('processStrip');
  STATIONS.forEach(function(s, i){
    var risk = RISK[i];
    var a = document.createElement('a');
    a.className = 'proc-chip risk-' + risk;
    a.href = '#station-' + i;
    a.innerHTML =
      '<span class="connector"></span>' +
      '<span class="num">' + String(i+1).padStart(2,'0') + '</span>' +
      '<span class="lbl">' + escapeHTML(firstLine(s.name)) + '</span>' +
      '<span class="dot"></span>';
    strip.appendChild(a);
  });

  // ---------------- intro ----------------
  document.getElementById('introText').innerHTML = linesHTML(G.intro);
  document.getElementById('section3Intro').innerHTML = linesHTML(G.section3_intro);

  // ---------------- general cards ----------------
  var GENERAL_DEFS = LANG === 'zh' ? [
    {icon:'ppe', title:'個人防護具（PPE）基本配備', text:G.ppe_basic},
    {icon:'sop', title:'設備異常處理原則（SOP）', text:G.equipment_sop},
    {icon:'forklift', title:'堆高機操作安全', text:G.forklift},
    {icon:'emergency', title:'緊急狀況通報流程', text:G.emergency, id:'emergency-card'}
  ] : [
    {icon:'ppe', title:'อุปกรณ์ป้องกันส่วนบุคคล (PPE)', text:G.ppe_basic},
    {icon:'sop', title:'หลักการปฏิบัติเมื่ออุปกรณ์ขัดข้อง (SOP)', text:G.equipment_sop},
    {icon:'forklift', title:'ความปลอดภัยในการใช้งานรถยก', text:G.forklift},
    {icon:'emergency', title:'ขั้นตอนการแจ้งเหตุฉุกเฉิน', text:G.emergency, id:'emergency-card'}
  ];
  var gc = document.getElementById('generalCards');
  GENERAL_DEFS.forEach(function(def, i){
    var d = document.createElement('details');
    d.className = 'card';
    if(def.id) d.id = def.id;
    if(i===0) d.open = true;
    d.innerHTML =
      '<summary>' +
        '<span class="icon">' + ICONS[def.icon] + '</span>' +
        '<span class="stitle">' + escapeHTML(def.title) + '</span>' +
        '<span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>' +
      '</summary>' +
      '<div class="card-body textblock">' + linesHTML(def.text) + '</div>';
    gc.appendChild(d);
  });

  // ---------------- station cards ----------------
  var SUBS = LANG === 'zh' ? [
    {key:'hazard',    cls:'hazard',  icon:'hazard',   label:'危害'},
    {key:'prevention',cls:'prevent', icon:'prevent',  label:'預防'},
    {key:'incident',  cls:'incident',icon:'incident', label:'異常／受傷發生時'},
    {key:'ppe',       cls:'ppe',     icon:'gear',     label:'防護具'}
  ] : [
    {key:'hazard',    cls:'hazard',  icon:'hazard',   label:'อันตราย'},
    {key:'prevention',cls:'prevent', icon:'prevent',  label:'การป้องกัน'},
    {key:'incident',  cls:'incident',icon:'incident', label:'เมื่อเกิดเหตุ / บาดเจ็บ'},
    {key:'ppe',       cls:'ppe',     icon:'gear',     label:'อุปกรณ์ป้องกัน'}
  ];
  var tankLabel = LANG === 'zh' ? '槽體配置' : 'การจัดวางถัง';
  var sc = document.getElementById('stationCards');
  STATIONS.forEach(function(s, i){
    var risk = RISK[i];
    var d = document.createElement('details');
    d.className = 'card station risk-' + risk;
    d.id = 'station-' + i;
    var body = '';
    if(s.tank){
      body += '<div class="tankbox"><strong>' + tankLabel + '</strong><div class="textblock">' + linesHTML(s.tank) + '</div></div>';
    }
    SUBS.forEach(function(sub){
      var val = s[sub.key];
      if(!val) return;
      body += '<div class="subblock ' + sub.cls + '">' +
                '<div class="sh">' + ICONS[sub.icon] + '<span>' + sub.label + '</span></div>' +
                '<div class="content textblock">' + linesHTML(val) + '</div>' +
              '</div>';
    });
    d.innerHTML =
      '<summary>' +
        '<span class="num">' + String(i+1).padStart(2,'0') + '</span>' +
        '<span class="stitle">' + nameHTML(s.name) + '</span>' +
        '<span class="risk-tag">' + RISK_LABEL[RISK_KEY[risk]] + '</span>' +
        '<span class="chev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg></span>' +
      '</summary>' +
      '<div class="card-body">' + body + '</div>';
    sc.appendChild(d);
  });

})();

</script>
</body>
</html>
